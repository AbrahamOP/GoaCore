<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoaCloud - Ajouter une Application</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/dusk/64/server.png">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="preconnect" href="https://img.icons8.com">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-[#0f0e17] text-gray-300 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Elements -->
    <div
        class="absolute top-0 right-0 w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none">
    </div>

    <div class="w-full max-w-2xl relative z-10">
        <!-- Breadcrumb / Back -->
        <a href="/" class="inline-flex items-center text-sm text-gray-500 hover:text-white mb-6 transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Retour au Dashboard
        </a>

        <div class="bg-[#1b1928] p-8 md:p-10 rounded-3xl border border-[#2a2839] shadow-2xl">
            <h2 class="text-3xl font-bold text-white mb-2">Nouvelle Application</h2>
            <p class="text-gray-500 mb-8">Ajoutez un service externe à votre dashboard.</p>

            <form action="/add" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="name"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">Nom</label>
                        <input type="text" id="name" name="name" required placeholder="Ex: Plex"
                            class="w-full bg-[#151421] border border-[#2a2839] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition placeholder-gray-600">
                    </div>

                    <div class="space-y-2">
                        <label for="category"
                            class="block text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">Catégorie</label>
                        <div class="relative">
                            <select id="category" name="category"
                                class="w-full bg-[#151421] border border-[#2a2839] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition appearance-none cursor-pointer">
                                <option value="General">Général</option>
                                <option value="Infrastructure">Infrastructure</option>
                                <option value="Monitoring">Monitoring</option>
                                <option value="Media">Média</option>
                                <option value="Home Automation">Domotique</option>
                                <option value="Development">Développement</option>
                            </select>
                            <div
                                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="url"
                        class="block text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">URL
                        Externe</label>
                    <input type="url" id="url" name="url" required placeholder="http://192.168.1.15:32400"
                        class="w-full bg-[#151421] border border-[#2a2839] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition placeholder-gray-600 text-cyan-400">
                </div>

                <div class="space-y-2">
                    <label for="description"
                        class="block text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">Description
                        (Optionnel)</label>
                    <input type="text" id="description" name="description" placeholder="Serveur Média personnel"
                        class="w-full bg-[#151421] border border-[#2a2839] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition placeholder-gray-600">
                </div>

                <div class="space-y-2">
                    <label for="icon_url"
                        class="block text-xs font-semibold text-gray-400 uppercase tracking-widest pl-1">URL de l'icône
                        (Optionnel)</label>
                    <input type="url" id="icon_url" name="icon_url" placeholder="https://..."
                        class="w-full bg-[#151421] border border-[#2a2839] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition placeholder-gray-600">
                </div>

                <div class="pt-6">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-lg shadow-cyan-900/30">
                        Enregistrer l'application
                    </button>

                    <a href="/"
                        class="block text-center mt-4 text-sm text-gray-500 hover:text-gray-300 transition">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
