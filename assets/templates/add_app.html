<!DOCTYPE html>
<html lang="fr">

<head>
    {{template "head-common"}}
    <title>GoaCloud - Ajouter une Application</title>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="w-full max-w-2xl relative z-10">
        <!-- Breadcrumb / Back -->
        <a href="/" class="inline-flex items-center text-sm text-on-surface-variant hover:text-on-surface mb-6 transition-colors">
            <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Retour au Dashboard
        </a>

        <div class="bg-surface-container p-8 md:p-10 rounded-xl border border-outline-variant shadow-lg">
            <h2 class="text-3xl font-bold mb-2">Nouvelle <span class="gradient-text">Application</span></h2>
            <p class="text-on-surface-variant mb-8">Ajoutez un service externe à votre dashboard.</p>

            <form action="/add" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="name"
                            class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Nom</label>
                        <input type="text" id="name" name="name" required placeholder="Ex: Plex"
                            class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant">
                    </div>

                    <div class="space-y-2">
                        <label for="category"
                            class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Catégorie</label>
                        <div class="relative">
                            <select id="category" name="category"
                                class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition appearance-none cursor-pointer">
                                <option value="General">Général</option>
                                <option value="Infrastructure">Infrastructure</option>
                                <option value="Monitoring">Monitoring</option>
                                <option value="Media">Média</option>
                                <option value="Home Automation">Domotique</option>
                                <option value="Development">Développement</option>
                            </select>
                            <div
                                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
                                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M19 9l-7 7-7-7" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="url"
                        class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">URL
                        Externe</label>
                    <input type="url" id="url" name="url" required placeholder="http://192.168.1.15:32400"
                        class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant text-primary">
                </div>

                <div class="space-y-2">
                    <label for="description"
                        class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Description
                        (Optionnel)</label>
                    <input type="text" id="description" name="description" placeholder="Serveur Média personnel"
                        class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant">
                </div>

                <div class="space-y-2">
                    <label for="icon_url"
                        class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">URL de l'icône
                        (Optionnel)</label>
                    <input type="url" id="icon_url" name="icon_url" placeholder="https://..."
                        class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant">
                </div>

                <div class="pt-6">
                    <button type="submit"
                        class="w-full bg-primary text-on-primary font-bold py-3 px-4 rounded-full transition duration-200 hover:shadow-md">
                        Enregistrer l'application
                    </button>

                    <a href="/"
                        class="block text-center mt-4 text-sm text-on-surface-variant hover:text-on-surface transition">Annuler</a>
                </div>
            </form>
        </div>
    </div>
    <script src="/static/theme.js"></script>
    <script src="/static/csrf.js"></script>
</body>

</html>
