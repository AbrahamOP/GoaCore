<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    {{template "head-common" .}}
    <title>GoaCloud - Console SSH</title>
    <!-- Xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .terminal-container {
            height: calc(100vh - 200px);
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex bg-surface text-on-surface">

    {{template "mobile-overlay" .}}

    {{template "sidebar" .}}

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 bg-surface relative overflow-hidden flex flex-col">
        {{template "top-actions" .}}
        <!-- Decoration Gradients (no blur for terminal perf) -->
        <div class="absolute top-0 left-0 w-96 h-96 bg-purple-600/5 rounded-full pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-600/5 rounded-full pointer-events-none"></div>

        <div class="flex-1 flex flex-col p-8 relative z-10 max-w-7xl mx-auto w-full h-full">
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-3xl font-bold mb-2">Console <span class="gradient-text">Web</span></h2>
                    <p class="text-on-surface-variant">Accès SSH direct à vos machines virtuelles.</p>
                </div>


                <div class="bg-surface-container p-2 rounded-xl flex items-center gap-2 border border-outline-variant" style="margin-right:52px">
                    <div class="relative group">
                        <i class="fas fa-server absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"></i>
                        <select id="conn-vm"
                            class="pl-9 pr-8 py-2 bg-transparent text-sm text-on-surface focus:outline-none appearance-none cursor-pointer hover:bg-surface-container-high rounded-lg transition-colors border-none min-w-[200px]">
                            <option value="" disabled selected class="bg-surface-container-low">Choisir une VM...</option>
                            {{range .VMs}}
                            <option value="{{.ID}}" class="bg-surface-container-low">{{.Name}} ({{.ID}})</option>
                            {{end}}
                        </select>
                        <i
                            class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xs pointer-events-none"></i>
                    </div>

                    <div class="w-px h-6 bg-outline-variant"></div>

                    <div class="relative group">
                        <i class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant"></i>
                        <select id="conn-key"
                            class="pl-9 pr-8 py-2 bg-transparent text-sm text-on-surface focus:outline-none appearance-none cursor-pointer hover:bg-surface-container-high rounded-lg transition-colors border-none min-w-[150px]">
                            <option value="" disabled selected class="bg-surface-container-low">Clé SSH...</option>
                            {{range .Keys}}
                            <option value="{{.ID}}" class="bg-surface-container-low">{{.Name}}</option>
                            {{end}}
                        </select>
                        <i
                            class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xs pointer-events-none"></i>
                    </div>

                    <div class="w-px h-6 bg-outline-variant"></div>

                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-xs"></i>
                        <input type="text" id="conn-user" value="root" placeholder="User"
                            class="pl-8 pr-3 py-2 bg-transparent text-sm text-on-surface focus:outline-none hover:bg-surface-container-high rounded-lg transition-colors w-24 border-none placeholder-on-surface-variant" />
                    </div>

                    <button id="btn-connect" onclick="connectSSH()"
                        class="ml-2 bg-primary text-on-primary px-5 py-2 rounded-full text-sm transition font-medium flex items-center">
                        <i class="fas fa-plug mr-2"></i> Connexion
                    </button>
                    <button id="btn-disconnect" onclick="disconnectSSH()"
                        class="hidden ml-2 bg-error-container text-error border border-error/50 px-5 py-2 rounded-full text-sm transition font-medium flex items-center">
                        <i class="fas fa-power-off mr-2"></i> Déconnexion
                    </button>
                </div>

            </div>

            <!-- Terminal Container -->
            <div
                class="flex-1 flex flex-col min-h-0 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-2xl overflow-hidden relative group">
                <!-- Mac-style Window Header -->
                <div class="h-10 bg-surface-container-high border-b border-outline-variant flex items-center px-4 justify-between select-none">
                    <div class="flex space-x-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/80 hover:bg-red-500 transition-colors cursor-pointer"
                            onclick="disconnectSSH()"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/80 hover:bg-yellow-500 transition-colors">
                        </div>
                        <div class="w-3 h-3 rounded-full bg-green-500/80 hover:bg-green-500 transition-colors">
                        </div>
                    </div>
                    <div
                        class="text-xs text-on-surface-variant font-mono flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-lock mr-1.5 text-[10px]"></i> ssh session
                    </div>
                </div>

                <!-- Terminal Body -->
                <div class="flex-1 p-4 relative">
                    <div id="terminal" class="w-full h-full"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Xterm.js & Addon -->
    <script src="/static/theme.js"></script>
    <script src="/static/csrf.js"></script>
    <script src="/static/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        let term;
        let fitAddon;
        let socket;

        window.onload = function () {
            function initTerminal() {
                term = new Terminal({
                    cursorBlink: true,
                    theme: {
                        background: '#0a0a0f',
                        foreground: '#f8f8f2',
                        cursor: '#f8f8f2',
                        selection: '#44475a88'
                    },
                    fontSize: 14,
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace'
                });

                fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);
                term.open(document.getElementById('terminal'));
                fitAddon.fit();

                term.write('\x1b[32mBienvenue dans GoaCloud SSH Console\x1b[0m\r\n');
                term.write('Sélectionnez une VM et une Clé pour commencer.\r\n');
            }

            // Wait for fonts to load before fitting terminal to avoid "W" artifacts
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(initTerminal);
            } else {
                initTerminal();
            }

            window.addEventListener('resize', () => {
                if (fitAddon) {
                    fitAddon.fit();
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        const dims = { cols: term.cols, rows: term.rows };
                        socket.send("RESIZE:" + term.rows + ":" + term.cols);
                    }
                }
            });
        };

        function connectSSH() {
            const vmId = document.getElementById('conn-vm').value;
            const keyId = document.getElementById('conn-key').value;
            const user = document.getElementById('conn-user').value;

            if (!vmId || !keyId) {
                term.write('\x1b[31mErreur: Veuillez sélectionner une VM et une Clé.\x1b[0m\r\n');
                return;
            }

            if (socket) {
                socket.close();
            }

            term.reset();
            term.write('Connexion en cours...\r\n');

            document.getElementById('btn-connect').classList.add('hidden');
            document.getElementById('btn-disconnect').classList.remove('hidden');

            // Determine WS protocol (ws or wss)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/ssh/ws?vmid=${vmId}&key_id=${keyId}&user=${user}`;

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                term.write('\x1b[32mConnecté !\x1b[0m\r\n');
                term.focus();
                // Send initial size
                setTimeout(() => {
                    fitAddon.fit();
                    socket.send("RESIZE:" + term.rows + ":" + term.cols);
                }, 500);
            };

            socket.onmessage = (event) => {
                term.write(event.data);
            };

            socket.onclose = () => {
                term.write('\r\n\x1b[31mDéconnecté.\x1b[0m\r\n');
                resetButtons();
            };

            socket.onerror = (error) => {
                term.write('\r\n\x1b[31mErreur WebSocket.\x1b[0m\r\n');
                console.error(error);
                resetButtons();
            };

            // Capture Term Input
            term.onData(data => {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(data);
                }
            });
        }

        function disconnectSSH() {
            if (socket) {
                socket.close();
            }
            resetButtons();
        }

        function resetButtons() {
            document.getElementById('btn-connect').classList.remove('hidden');
            document.getElementById('btn-disconnect').classList.add('hidden');
        }
    </script>
    {{template "sidebar-js" .}}
</body>

</html>
