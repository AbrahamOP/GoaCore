<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    {{template "head-common" .}}
    <title>GoaCloud - Console SSH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; }

        /* Themed selects */
        select.themed {
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            background-image:
                linear-gradient(45deg, transparent 50%, var(--md-color-on-surface-variant) 50%),
                linear-gradient(135deg, var(--md-color-on-surface-variant) 50%, transparent 50%);
            background-position: calc(100% - 16px) 50%, calc(100% - 10px) 50%;
            background-size: 6px 6px, 6px 6px;
            background-repeat: no-repeat;
            padding-right: 30px !important;
        }
        select.themed option { background-color: #1e1e2e; color: #cdd6f4; padding: 8px 12px; }
        select.themed option:disabled { color: #6c7086; }
        select.themed option:checked { background-color: #313244; }

        /* Terminal toolbar buttons */
        .term-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 500;
            color: var(--md-color-on-surface-variant);
            background: transparent; border: none; cursor: pointer;
            transition: background 150ms, color 150ms;
            gap: 4px;
        }
        .term-btn:hover { background: rgba(255,255,255,.08); color: var(--md-color-on-surface); }
        .term-btn.active { background: rgba(255,255,255,.12); color: var(--md-color-primary); }

        .term-btn svg { width: 14px; height: 14px; }

        /* Font size slider */
        input[type=range].font-slider { -webkit-appearance: none; height: 4px; border-radius: 9999px; background: rgba(255,255,255,.15); outline: none; vertical-align: middle; margin: 0; }
        input[type=range].font-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--md-color-primary); cursor: pointer; margin-top: -4px; }
        input[type=range].font-slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--md-color-primary); cursor: pointer; border: none; }
        input[type=range].font-slider::-webkit-slider-runnable-track { height: 4px; border-radius: 9999px; }

        /* Fullscreen terminal */
        main.fullscreen-terminal { position: fixed; inset: 0; z-index: 100; margin: 0 !important; }
        main.fullscreen-terminal .console-header,
        main.fullscreen-terminal .console-kpi { display: none !important; }
        main.fullscreen-terminal .console-wrapper { padding: 0 !important; max-width: 100% !important; }
        main.fullscreen-terminal .terminal-card { border-radius: 0 !important; border: none !important; }
    </style>
</head>

<body class="h-screen overflow-hidden flex bg-surface text-on-surface">

    {{template "mobile-overlay" .}}
    {{template "sidebar" .}}

    <!-- Main Content -->
    <main id="console-main" class="flex-1 md:ml-64 bg-surface relative overflow-hidden flex flex-col">
        {{template "bubbles"}}

        <div class="flex-1 flex flex-col p-3 sm:p-6 relative z-10 mx-auto w-full h-full console-wrapper" style="max-width:1400px;">

            <!-- Header -->
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6 console-header">
                <div>
                    <h2 class="text-3xl font-bold text-on-surface mb-1">Console <span class="gradient-text">Web</span></h2>
                    <p class="text-on-surface-variant text-sm">Accès SSH direct à vos machines virtuelles.</p>
                </div>
                <div class="flex items-center gap-3 flex-wrap">
                    {{template "top-actions"}}
                </div>
            </div>

            <!-- Connection card -->
            <div class="bg-surface-container border border-outline-variant rounded-xl shadow-xl overflow-hidden mb-6 console-header">
                <!-- Card header -->
                <div class="px-6 py-3 border-b border-outline-variant flex items-center justify-between gap-3"
                     style="background: linear-gradient(135deg, rgba(6,182,212,0.12) 0%, var(--md-color-surface-container) 70%);">
                    <div class="flex items-center gap-3">
                        <div id="conn-status-dot" class="w-2.5 h-2.5 rounded-full bg-on-surface-variant" style="transition: background 300ms;"></div>
                        <span class="text-sm font-semibold text-on-surface">Connexion SSH</span>
                        <span id="conn-status-label" class="text-xs text-on-surface-variant">Déconnecté</span>
                    </div>
                    <span id="idle-timer" class="text-xs font-mono text-on-surface-variant hidden"></span>
                </div>
                <!-- Controls row -->
                <div class="px-4 py-4 flex flex-wrap items-end gap-3" style="row-gap:0.75rem;">
                    <div class="flex-1" style="min-width:min(160px, 100%);">
                        <label class="block text-xs font-medium text-on-surface-variant mb-1">Cible (VM)</label>
                        <select id="conn-vm" onchange="onVMChange()"
                            class="themed w-full bg-transparent border border-outline rounded-xs px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary">
                            <option value="" disabled selected>Choisir une VM...</option>
                            {{range .VMs}}
                            <option value="{{.ID}}" data-name="{{.Name}}">{{.Name}} ({{.ID}})</option>
                            {{end}}
                        </select>
                    </div>
                    <div class="flex-1" style="min-width:min(140px, 100%);">
                        <label class="block text-xs font-medium text-on-surface-variant mb-1">Clé SSH</label>
                        <select id="conn-key"
                            class="themed w-full bg-transparent border border-outline rounded-xs px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary">
                            <option value="" disabled selected>Clé SSH...</option>
                            {{range .Keys}}
                            <option value="{{.ID}}" data-name="{{.Name}}" data-associated-vms="{{.AssociatedVMs}}">{{.Name}}</option>
                            {{end}}
                        </select>
                    </div>
                    <div style="min-width:min(100px, 100%);">
                        <label class="block text-xs font-medium text-on-surface-variant mb-1">Utilisateur</label>
                        <input type="text" id="conn-user" value="root" placeholder="root"
                            class="w-full bg-transparent border border-outline rounded-xs px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary placeholder-on-surface-variant" />
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="btn-connect" onclick="connectSSH()"
                            class="bg-primary text-on-primary px-6 py-2 rounded-full text-sm transition font-medium flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            Connexion
                        </button>
                        <button id="btn-disconnect" onclick="disconnectSSH()"
                            class="hidden bg-error-container text-error border border-error/50 px-6 py-2 rounded-full text-sm transition font-medium flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                            Déconnexion
                        </button>
                    </div>
                </div>
            </div>

            <!-- Terminal Container -->
            <div class="flex-1 flex flex-col min-h-0 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-2xl overflow-hidden relative terminal-card">
                <!-- Terminal toolbar -->
                <div class="bg-surface-container-high border-b border-outline-variant flex items-center px-4 justify-between select-none" style="height:40px; min-height:40px; max-height:40px;">
                    <!-- Left: traffic lights + session label -->
                    <div class="flex items-center gap-3">
                        <div class="flex space-x-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/80 cursor-pointer" onclick="disconnectSSH()" title="Déconnecter"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/80" title="Minimiser"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/80 cursor-pointer" onclick="toggleFullscreen()" title="Plein écran"></div>
                        </div>
                        <span id="term-session-label" class="text-xs text-on-surface-variant font-mono hidden">
                            <svg class="w-3 h-3 inline mr-1 text-green-400" fill="currentColor" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4"/></svg>
                            <span id="term-session-text">ssh session</span>
                        </span>
                    </div>

                    <!-- Right: toolbar buttons -->
                    <div class="flex items-center gap-1">
                        <!-- Font size -->
                        <span class="text-xs text-on-surface-variant mr-1" style="font-size:10px;">A</span>
                        <input type="range" id="font-slider" min="10" max="22" value="14" step="1"
                            class="font-slider" style="width:60px;" oninput="setFontSize(this.value)" title="Taille de police">
                        <span class="text-xs text-on-surface-variant ml-0.5 mr-2" style="font-size:14px;">A</span>

                        <div class="w-px h-5 bg-outline-variant mx-1"></div>

                        <!-- Theme -->
                        <button class="term-btn" onclick="cycleTheme()" title="Changer le thème">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
                        </button>

                        <!-- Clear -->
                        <button class="term-btn" onclick="clearTerminal()" title="Effacer le terminal">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>

                        <!-- Fullscreen -->
                        <button class="term-btn" onclick="toggleFullscreen()" title="Plein écran" id="btn-fullscreen">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
                        </button>

                        <!-- Reconnect -->
                        <button class="term-btn" onclick="reconnectSSH()" title="Reconnecter" id="btn-reconnect">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Terminal Body -->
                <div class="flex-1 p-2 relative" style="background:#0a0a0f;">
                    <div id="terminal" class="w-full h-full"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Xterm.js & Addons -->
    <script src="/static/theme.js"></script>
    <script src="/static/csrf.js"></script>
    <script src="/static/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        var term, fitAddon, socket;
        var isConnected = false;
        var lastConnParams = null;

        // ── Terminal themes ─────────────────────────────
        var themes = [
            { name:'Dracula',   bg:'#0a0a0f', fg:'#f8f8f2', cursor:'#f8f8f2', sel:'#44475a88' },
            { name:'Solarized', bg:'#002b36', fg:'#839496', cursor:'#93a1a1', sel:'#073642' },
            { name:'Monokai',   bg:'#272822', fg:'#f8f8f2', cursor:'#f8f8f0', sel:'#49483e' },
            { name:'Nord',      bg:'#2e3440', fg:'#d8dee9', cursor:'#d8dee9', sel:'#3b4252' },
            { name:'Matrix',    bg:'#0d0d0d', fg:'#00ff41', cursor:'#00ff41', sel:'#003b00' }
        ];
        var currentThemeIdx = 0;

        // ── Idle timer ──────────────────────────────────
        var IDLE_TIMEOUT = 30 * 60; // 30 min (seconds)
        var idleSeconds = 0;
        var idleInterval = null;

        function startIdleTimer() {
            idleSeconds = 0;
            if (idleInterval) clearInterval(idleInterval);
            idleInterval = setInterval(function () {
                idleSeconds++;
                var remaining = IDLE_TIMEOUT - idleSeconds;
                var el = document.getElementById('idle-timer');
                if (remaining <= 300 && remaining > 0) {
                    // Show warning in last 5 minutes
                    var m = Math.floor(remaining / 60);
                    var s = remaining % 60;
                    el.textContent = 'Timeout: ' + m + ':' + (s < 10 ? '0' : '') + s;
                    el.classList.remove('hidden');
                    el.style.color = remaining <= 60 ? '#ef4444' : '#f59e0b';
                } else if (remaining <= 0) {
                    el.textContent = 'Session expirée';
                    el.classList.remove('hidden');
                    clearInterval(idleInterval);
                } else {
                    el.classList.add('hidden');
                }
            }, 1000);
        }
        function resetIdleTimer() { idleSeconds = 0; }
        function stopIdleTimer() {
            if (idleInterval) clearInterval(idleInterval);
            document.getElementById('idle-timer').classList.add('hidden');
        }

        // ── Connection status indicator ─────────────────
        function setConnectionState(state) {
            var dot = document.getElementById('conn-status-dot');
            var label = document.getElementById('conn-status-label');
            var sessionLabel = document.getElementById('term-session-label');
            var sessionText = document.getElementById('term-session-text');
            isConnected = state === 'connected';
            if (state === 'connected') {
                dot.style.background = '#22c55e';
                label.textContent = 'Connecté';
                label.style.color = '#22c55e';
                sessionLabel.classList.remove('hidden');
                var vm = document.getElementById('conn-vm');
                var user = document.getElementById('conn-user').value || 'root';
                var vmName = vm.options[vm.selectedIndex] ? vm.options[vm.selectedIndex].text : '';
                sessionText.textContent = user + '@' + vmName;
            } else if (state === 'connecting') {
                dot.style.background = '#f59e0b';
                label.textContent = 'Connexion…';
                label.style.color = '#f59e0b';
                sessionLabel.classList.add('hidden');
            } else {
                dot.style.background = '';
                label.textContent = 'Déconnecté';
                label.style.color = '';
                sessionLabel.classList.add('hidden');
            }
        }

        // ── Remember last user per VM ───────────────────
        function saveUserForVM(vmId, user) {
            try {
                var data = JSON.parse(localStorage.getItem('goacloud_ssh_users') || '{}');
                data[vmId] = user;
                localStorage.setItem('goacloud_ssh_users', JSON.stringify(data));
            } catch(e) {}
        }
        function loadUserForVM(vmId) {
            try {
                var data = JSON.parse(localStorage.getItem('goacloud_ssh_users') || '{}');
                return data[vmId] || '';
            } catch(e) { return ''; }
        }
        function onVMChange() {
            var vmId = document.getElementById('conn-vm').value;
            var saved = loadUserForVM(vmId);
            if (saved) document.getElementById('conn-user').value = saved;

            // Auto-select SSH key
            autoSelectKey();
        }
        function autoSelectKey() {
            var vmSelect = document.getElementById('conn-vm');
            var keySelect = document.getElementById('conn-key');
            var opt = vmSelect.options[vmSelect.selectedIndex];
            if (!opt) return;
            var vmName = (opt.dataset.name || '').toLowerCase();
            if (!vmName) return;
            for (var i = 0; i < keySelect.options.length; i++) {
                var o = keySelect.options[i];
                if (o.disabled) continue;
                var assoc = (o.dataset.associatedVms || '').toLowerCase();
                if (assoc) {
                    var list = assoc.split(',').map(function(s){ return s.trim(); });
                    if (list.indexOf(vmName) !== -1) { keySelect.selectedIndex = i; return; }
                }
            }
        }

        // ── Terminal init ───────────────────────────────
        window.onload = function () {
            function initTerminal() {
                var t = themes[currentThemeIdx];
                term = new Terminal({
                    cursorBlink: true,
                    theme: { background: t.bg, foreground: t.fg, cursor: t.cursor, selection: t.sel },
                    fontSize: 14,
                    fontFamily: 'Menlo, Monaco, "Courier New", monospace'
                });
                fitAddon = new FitAddon.FitAddon();
                term.loadAddon(fitAddon);
                term.open(document.getElementById('terminal'));
                fitAddon.fit();
                term.write('\x1b[36mGoaCloud SSH Console\x1b[0m\r\n');
                term.write('\x1b[90mSélectionnez une VM et une clé pour démarrer.\x1b[0m\r\n');
            }
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(initTerminal);
            } else {
                initTerminal();
            }
            window.addEventListener('resize', function () {
                if (fitAddon) {
                    fitAddon.fit();
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send('RESIZE:' + term.rows + ':' + term.cols);
                    }
                }
            });
        };

        // ── Connect / Disconnect ────────────────────────
        function connectSSH() {
            var vmId = document.getElementById('conn-vm').value;
            var keyId = document.getElementById('conn-key').value;
            var user = document.getElementById('conn-user').value || 'root';

            if (!vmId || !keyId) {
                term.write('\x1b[31mErreur: Veuillez sélectionner une VM et une Clé.\x1b[0m\r\n');
                return;
            }

            saveUserForVM(vmId, user);
            lastConnParams = { vmId: vmId, keyId: keyId, user: user };

            if (socket) socket.close();
            term.reset();
            term.write('\x1b[33mConnexion en cours…\x1b[0m\r\n');
            setConnectionState('connecting');

            document.getElementById('btn-connect').classList.add('hidden');
            document.getElementById('btn-disconnect').classList.remove('hidden');

            var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var wsUrl = protocol + '//' + window.location.host + '/api/ssh/ws?vmid=' + vmId + '&key_id=' + keyId + '&user=' + encodeURIComponent(user);
            socket = new WebSocket(wsUrl);

            socket.onopen = function () {
                setConnectionState('connected');
                startIdleTimer();
                term.focus();
                setTimeout(function () {
                    fitAddon.fit();
                    socket.send('RESIZE:' + term.rows + ':' + term.cols);
                }, 500);
            };

            socket.onmessage = function (e) {
                term.write(e.data);
                resetIdleTimer();
            };

            socket.onclose = function () {
                term.write('\r\n\x1b[31m⏻ Déconnecté.\x1b[0m\r\n');
                setConnectionState('disconnected');
                stopIdleTimer();
                resetButtons();
            };

            socket.onerror = function (err) {
                term.write('\r\n\x1b[31m✖ Erreur WebSocket.\x1b[0m\r\n');
                console.error(err);
                setConnectionState('disconnected');
                stopIdleTimer();
                resetButtons();
            };

            term.onData(function (data) {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(data);
                    resetIdleTimer();
                }
            });
        }

        function disconnectSSH() {
            if (socket) socket.close();
            setConnectionState('disconnected');
            stopIdleTimer();
            resetButtons();
        }

        function reconnectSSH() {
            if (!lastConnParams) {
                term.write('\x1b[33mAucune session précédente à reconnecter.\x1b[0m\r\n');
                return;
            }
            document.getElementById('conn-vm').value = lastConnParams.vmId;
            document.getElementById('conn-key').value = lastConnParams.keyId;
            document.getElementById('conn-user').value = lastConnParams.user;
            connectSSH();
        }

        function resetButtons() {
            document.getElementById('btn-connect').classList.remove('hidden');
            document.getElementById('btn-disconnect').classList.add('hidden');
        }

        // ── Terminal toolbar actions ────────────────────
        function clearTerminal() {
            if (term) term.clear();
        }

        function setFontSize(size) {
            if (!term) return;
            term.options.fontSize = parseInt(size);
            if (fitAddon) fitAddon.fit();
        }

        function cycleTheme() {
            currentThemeIdx = (currentThemeIdx + 1) % themes.length;
            var t = themes[currentThemeIdx];
            if (term) {
                term.options.theme = { background: t.bg, foreground: t.fg, cursor: t.cursor, selection: t.sel };
            }
            var bg = document.querySelector('.terminal-card .flex-1');
            if (bg) bg.style.background = t.bg;
            term.write('\x1b[90m[Thème: ' + t.name + ']\x1b[0m\r\n');
        }

        var isFullscreen = false;
        function toggleFullscreen() {
            var main = document.getElementById('console-main');
            isFullscreen = !isFullscreen;
            main.classList.toggle('fullscreen-terminal', isFullscreen);
            setTimeout(function () { if (fitAddon) fitAddon.fit(); }, 100);
        }
        // Escape key exits fullscreen
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && isFullscreen) {
                toggleFullscreen();
            }
        });
    </script>
    {{template "sidebar-js" .}}
</body>

</html>
