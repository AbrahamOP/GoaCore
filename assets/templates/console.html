<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoaCloud - Console SSH</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/dusk/64/server.png">
    <link rel="stylesheet" href="/static/tailwind.min.css">
    <link rel="stylesheet" href="/static/theme.css">
    <link rel="preconnect" href="https://img.icons8.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <!-- Xterm.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0F0E17;
            color: #E2E2E2;
        }

        .glass-panel {
            background: rgba(22, 21, 33, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-link {
            transition: all 0.3s ease;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(139, 92, 246, 0.15);
            color: #A78BFA;
            border-left: 3px solid #8B5CF6;
        }

        .terminal-container {
            height: calc(100vh - 200px);
        }
    </style>
</head>

<body class="h-screen overflow-hidden flex">

    <!-- Sidebar -->

                    <div class="w-3 h-3 rounded-full bg-gradient-to-r from-fuchsia-500 to-cyan-500"></div>
                    GoaCloud
                </h1>
            </div>

            <nav class="mt-4 px-4 space-y-2">

                <a href="/"
                    class="sidebar-link flex items-center px-4 py-3 text-sm font-medium rounded-r-lg hover:bg-white/5 hover:text-white text-gray-400 transition-colors duration-200">
                    <svg class="w-5 h-5 mr-3 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                    </svg>

                <a href="/proxmox"

                    <svg class="w-5 h-5 mr-3 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />

                    <svg class="w-5 h-5 mr-3 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                <a href="/soar"

                    <svg class="w-5 h-5 mr-3 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                <a href="/ssh"

                    <svg class="w-5 h-5 mr-3 text-orange-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                <a href="/console"

                    <svg class="w-5 h-5 mr-3 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">

            </nav>

            <a id="sidebar-github-link" href="/profile" title="Mon profil"

                </svg>
            </a>

            <a href="/users" title="Administration"
                class="block p-2 text-gray-400 hover:text-white rounded-lg hover:bg-white/5 transition-colors duration-200">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </a>
            <form action="/logout" method="POST">
                <button type="submit" title="Déconnexion"
                    class="block p-2 text-red-400 hover:text-red-300 rounded-lg hover:bg-red-500/10 transition-colors duration-200">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 md:ml-64 bg-[#0F0E17] relative overflow-hidden flex flex-col">
        <!-- Top Right Actions (Profile) -->
        <div class="absolute top-6 right-6 z-50 flex items-center gap-4">
            <!-- Desktop Profile Link -->
            <a href="/profile"
                class="hidden md:flex items-center justify-center p-2 rounded-lg bg-[#1b1928] hover:bg-white/5 text-cyan-400 hover:text-cyan-300 transition-colors border border-[#2a2839] group"
                title="Mon Profil">
                <svg class="w-6 h-6 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </a>
        </div>
        <!-- Decoration Gradients (no blur for terminal perf) -->
        <div class="absolute top-0 left-0 w-96 h-96 bg-purple-600/5 rounded-full pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-600/5 rounded-full pointer-events-none"></div>

        <div class="flex-1 flex flex-col p-8 relative z-10 max-w-7xl mx-auto w-full h-full">
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-3xl font-bold text-white mb-2">Console Web</h2>
                    <p class="text-gray-400">Accès SSH direct à vos machines virtuelles.</p>
                </div>


                <div class="glass-panel p-2 rounded-xl flex items-center gap-2">
                    <div class="relative group">
                        <i class="fas fa-server absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <select id="conn-vm"
                            class="pl-9 pr-8 py-2 bg-transparent text-sm text-white focus:outline-none appearance-none cursor-pointer hover:bg-white/5 rounded-lg transition-colors border-none min-w-[200px]">
                            <option value="" disabled selected class="bg-[#161521]">Choisir une VM...</option>
                            {{range .VMs}}
                            <option value="{{.ID}}" class="bg-[#161521]">{{.Name}} ({{.ID}})</option>
                            {{end}}
                        </select>
                        <i
                            class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                    </div>

                    <div class="w-px h-6 bg-gray-700"></div>

                    <div class="relative group">
                        <i class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <select id="conn-key"
                            class="pl-9 pr-8 py-2 bg-transparent text-sm text-white focus:outline-none appearance-none cursor-pointer hover:bg-white/5 rounded-lg transition-colors border-none min-w-[150px]">
                            <option value="" disabled selected class="bg-[#161521]">Clé SSH...</option>
                            {{range .Keys}}
                            <option value="{{.ID}}" class="bg-[#161521]">{{.Name}}</option>
                            {{end}}
                        </select>
                        <i
                            class="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs pointer-events-none"></i>
                    </div>

                    <div class="w-px h-6 bg-gray-700"></div>

                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="conn-user" value="root" placeholder="User"
                            class="pl-8 pr-3 py-2 bg-transparent text-sm text-white focus:outline-none hover:bg-white/5 rounded-lg transition-colors w-24 border-none placeholder-gray-600" />
                    </div>

                    <button id="btn-connect" onclick="connectSSH()"
                        class="ml-2 bg-violet-600 hover:bg-violet-500 text-white px-5 py-2 rounded-lg text-sm transition font-medium shadow-lg shadow-violet-500/20 flex items-center">
                        <i class="fas fa-plug mr-2"></i> Connexion
                    </button>
                    <button id="btn-disconnect" onclick="disconnectSSH()"
                        class="hidden ml-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/50 px-5 py-2 rounded-lg text-sm transition font-medium flex items-center">
                        <i class="fas fa-power-off mr-2"></i> Déconnexion
                    </button>
                </div>

            </div>

            <!-- Terminal Container -->
            <div
                class="flex-1 flex flex-col min-h-0 bg-[#0a0a0f] border border-white/10 rounded-2xl shadow-2xl overflow-hidden relative group">
                <!-- Mac-style Window Header -->
                <div class="h-10 bg-white/5 border-b border-white/5 flex items-center px-4 justify-between select-none">
                    <div class="flex space-x-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/80 hover:bg-red-500 transition-colors cursor-pointer"
                            onclick="disconnectSSH()"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/80 hover:bg-yellow-500 transition-colors">
                        </div>
                        <div class="w-3 h-3 rounded-full bg-green-500/80 hover:bg-green-500 transition-colors">
                        </div>
                    </div>
                    <div
                        class="text-xs text-gray-500 font-mono flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fas fa-lock mr-1.5 text-[10px]"></i> ssh session
                    </div>
                </div>

                <!-- Terminal Body -->
                <div class="flex-1 p-4 relative">
                    <div id="terminal" class="w-full h-full"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Xterm.js & Addon -->
    <script src="/static/theme.js"></script>
    <script src="/static/search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

    <script>
        let term;
        let fitAddon;
        let socket;

        window.onload = function () {
            term = new Terminal({
                cursorBlink: true,
                theme: {
                    background: '#0a0a0f',
                    foreground: '#f8f8f2',
                    cursor: '#f8f8f2',
                    selection: '#44475a88'
                },
                fontSize: 14,
                fontFamily: 'Menlo, Monaco, "Courier New", monospace'
            });

            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal'));
            fitAddon.fit();

            term.write('\x1b[32mBienvenue dans GoaCloud SSH Console\x1b[0m\r\n');
            term.write('Sélectionnez une VM et une Clé pour commencer.\r\n');

            window.addEventListener('resize', () => {
                if (fitAddon) {
                    fitAddon.fit();
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        const dims = { cols: term.cols, rows: term.rows };
                        socket.send("RESIZE:" + term.rows + ":" + term.cols);
                    }
                }
            });
        };

        function connectSSH() {
            const vmId = document.getElementById('conn-vm').value;
            const keyId = document.getElementById('conn-key').value;
            const user = document.getElementById('conn-user').value;

            if (!vmId || !keyId) {
                term.write('\x1b[31mErreur: Veuillez sélectionner une VM et une Clé.\x1b[0m\r\n');
                return;
            }

            if (socket) {
                socket.close();
            }

            term.reset();
            term.write('Connexion en cours...\r\n');

            document.getElementById('btn-connect').classList.add('hidden');
            document.getElementById('btn-disconnect').classList.remove('hidden');

            // Determine WS protocol (ws or wss)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/ssh/ws?vmid=${vmId}&key_id=${keyId}&user=${user}`;

            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                term.write('\x1b[32mConnecté !\x1b[0m\r\n');
                term.focus();
                // Send initial size
                setTimeout(() => {
                    fitAddon.fit();
                    socket.send("RESIZE:" + term.rows + ":" + term.cols);
                }, 500);
            };

            socket.onmessage = (event) => {
                term.write(event.data);
            };

            socket.onclose = () => {
                term.write('\r\n\x1b[31mDéconnecté.\x1b[0m\r\n');
                resetButtons();
            };

            socket.onerror = (error) => {
                term.write('\r\n\x1b[31mErreur WebSocket.\x1b[0m\r\n');
                console.error(error);
                resetButtons();
            };

            // Capture Term Input
            term.onData(data => {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(data);
                }
            });
        }

        function disconnectSSH() {
            if (socket) {
                socket.close();
            }
            resetButtons();
        }

        function resetButtons() {
            document.getElementById('btn-connect').classList.remove('hidden');
            document.getElementById('btn-disconnect').classList.add('hidden');
        }
    </script>
    <script>
        document.querySelectorAll('.sidebar-link').forEach(link => {
            if (link.getAttribute('href') === window.location.pathname) {
                link.classList.add('active');
            }
        });
        fetch('/api/me').then(r => r.json()).then(data => {
            if (data.github_url) {
                const link = document.getElementById('sidebar-github-link');
                if (link) {
                    link.href = data.github_url;
                    link.target = '_blank';
                    link.title = 'Mon profil GitHub';
                }
            }
        }).catch(() => {});
    </script>
</body>

</html>
