{{define "sidebar-js"}}
<script>
    // Active link highlight
    document.querySelectorAll('.sidebar-link').forEach(link => {
        if (link.getAttribute('href') === window.location.pathname) {
            link.classList.add('active');
        }
    });
    // GitHub profile link
    fetch('/api/me').then(r => r.json()).then(data => {
        if (data.github_url) {
            const link = document.getElementById('sidebar-github-link');
            if (link) { link.href = data.github_url; link.target = '_blank'; link.title = 'Mon profil GitHub'; }
        }
    }).catch(() => {});
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobile-overlay');
        if (btn && sidebar && overlay) {
            function toggleMenu() {
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); }
                else { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); }
            }
            btn.addEventListener('click', toggleMenu);
            overlay.addEventListener('click', toggleMenu);
        }
    });
</script>
{{end}}
