<!DOCTYPE html>
<html lang="fr">

<head>
    {{template "head-common"}}
    <title>Connexion - GoaCloud</title>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-surface min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Decoration Gradients (sidebar palette) -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-purple-500/20 rounded-full pointer-events-none blur-2xl"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-cyan-600/5 rounded-full pointer-events-none blur-2xl"></div>
    <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/20 rounded-full pointer-events-none blur-2xl"></div>
    <div class="absolute top-1/2 right-0 w-48 h-48 bg-orange-500/20 rounded-full pointer-events-none blur-2xl -translate-y-1/2"></div>
    <div class="absolute bottom-0 left-1/2 w-48 h-48 bg-yellow-500/20 rounded-full pointer-events-none blur-2xl -translate-x-1/2"></div>
    <div class="absolute top-1/2 left-0 w-32 h-32 bg-green-500/20 rounded-full pointer-events-none blur-2xl -translate-y-1/2"></div>
    <div class="absolute top-0 left-1/2 w-48 h-48 bg-blue-500/20 rounded-full pointer-events-none blur-2xl -translate-x-1/2"></div>

    <div
        class="bg-surface-container p-10 rounded-xl shadow-lg w-full max-w-md border border-outline-variant relative z-10">
        <div class="text-center mb-10">
            <h1
                class="text-4xl font-bold mb-2 gradient-text inline-block">
                GoaCloud</h1>
            <p class="text-on-surface-variant text-sm">Bon retour, veuillez vous connecter à votre compte.</p>
        </div>

        {{if .Error}}
        <div class="bg-error-container text-error border border-error-container px-4 py-3 rounded-xl mb-6 text-sm text-center">
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST" class="space-y-6">
            {{if .MFARequired}}
            <div class="space-y-2 animate-fade-in">
                <label for="mfa_code"
                    class="block text-xs font-semibold text-primary uppercase tracking-widest pl-1">Code
                    Authenticator</label>
                <input type="text" id="mfa_code" name="mfa_code" autofocus autocomplete="off"
                    class="w-full bg-transparent border border-primary rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant text-center tracking-[0.5em] text-xl font-mono"
                    placeholder="000000">
                <p class="text-xs text-on-surface-variant text-center pt-2">Veuillez entrer le code à 6 chiffres de votre
                    application.</p>

                <!-- Hidden fields to maintain state -->
                <input type="hidden" name="username" value="{{.Username}}">
                <input type="hidden" name="password" value="{{.Password}}">
            </div>
            {{else}}
            <div class="space-y-2">
                <label for="username"
                    class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Utilisateur</label>
                <input type="text" id="username" name="username" required value="{{.Username}}"
                    class="js-clear-on-focus w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant"
                    placeholder="Votre nom d'utilisateur">
            </div>

            <div class="space-y-2">
                <label for="password"
                    class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Mot de
                    passe</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                        class="js-clear-on-focus w-full bg-transparent border border-outline rounded-xs pl-4 pr-12 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant"
                        placeholder="••••••••">
                    <button type="button" data-toggle-password="password" tabindex="-1"
                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface focus:outline-none"
                        aria-label="Afficher le mot de passe">
                        <svg class="h-5 w-5 icon-eye" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        <svg class="h-5 w-5 icon-eye-off hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L14.12 14.12m0 0L21 21m-6.88-6.88a3 3 0 01-4.242-4.242" />
                        </svg>
                    </button>
                </div>
            </div>
            {{end}}

            <button type="submit"
                class="w-full bg-primary text-on-primary font-bold py-3 px-4 rounded-full transition duration-200 hover:shadow-md">
                Connexion
            </button>
        </form>
    </div>
    <script src="/static/theme.js"></script>
    <script src="/static/csrf.js"></script>
    <script>
        // Clear field value on first focus
        document.querySelectorAll('.js-clear-on-focus').forEach(function (input) {
            input.addEventListener('focus', function () {
                if (!input.dataset.cleared) {
                    input.value = '';
                    input.dataset.cleared = '1';
                }
            });
        });

        // Toggle password visibility
        document.querySelectorAll('[data-toggle-password]').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var target = document.getElementById(btn.getAttribute('data-toggle-password'));
                if (!target) return;
                var eye = btn.querySelector('.icon-eye');
                var eyeOff = btn.querySelector('.icon-eye-off');
                if (target.type === 'password') {
                    target.type = 'text';
                    eye.classList.add('hidden');
                    eyeOff.classList.remove('hidden');
                    btn.setAttribute('aria-label', 'Masquer le mot de passe');
                } else {
                    target.type = 'password';
                    eyeOff.classList.add('hidden');
                    eye.classList.remove('hidden');
                    btn.setAttribute('aria-label', 'Afficher le mot de passe');
                }
            });
        });
    </script>
</body>

</html>
