<!DOCTYPE html>
<html lang="fr">

<head>
    {{template "head-common"}}
    <title>Connexion - GoaCloud</title>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-surface min-h-screen flex items-center justify-center relative overflow-hidden">

    <div
        class="bg-surface-container p-10 rounded-xl shadow-lg w-full max-w-md border border-outline-variant relative z-10">
        <div class="text-center mb-10">
            <h1
                class="text-4xl font-bold mb-2 gradient-text inline-block">
                GoaCloud</h1>
            <p class="text-on-surface-variant text-sm">Bon retour, veuillez vous connecter à votre compte.</p>
        </div>

        {{if .Error}}
        <div class="bg-error-container text-error border border-error-container px-4 py-3 rounded-xl mb-6 text-sm text-center">
            {{.Error}}
        </div>
        {{end}}

        <form action="/login" method="POST" class="space-y-6">
            {{if .MFARequired}}
            <div class="space-y-2 animate-fade-in">
                <label for="mfa_code"
                    class="block text-xs font-semibold text-primary uppercase tracking-widest pl-1">Code
                    Authenticator</label>
                <input type="text" id="mfa_code" name="mfa_code" autofocus autocomplete="off"
                    class="w-full bg-transparent border border-primary rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant text-center tracking-[0.5em] text-xl font-mono"
                    placeholder="000000">
                <p class="text-xs text-on-surface-variant text-center pt-2">Veuillez entrer le code à 6 chiffres de votre
                    application.</p>

                <!-- Hidden fields to maintain state -->
                <input type="hidden" name="username" value="{{.Username}}">
                <input type="hidden" name="password" value="{{.Password}}">
            </div>
            {{else}}
            <div class="space-y-2">
                <label for="username"
                    class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Utilisateur</label>
                <input type="text" id="username" name="username" required value="{{.Username}}"
                    class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant"
                    placeholder="Votre nom d'utilisateur">
            </div>

            <div class="space-y-2">
                <label for="password"
                    class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest pl-1">Mot de
                    passe</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-transparent border border-outline rounded-xs px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary transition placeholder-on-surface-variant"
                    placeholder="••••••••">
            </div>
            {{end}}

            <button type="submit"
                class="w-full bg-primary text-on-primary font-bold py-3 px-4 rounded-full transition duration-200 hover:shadow-md">
                Connexion
            </button>
        </form>
    </div>
    <script src="/static/theme.js"></script>
    <script src="/static/csrf.js"></script>
</body>

</html>
