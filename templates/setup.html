<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoaCloud | Initialisation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f0e17;
            color: #fffffe;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff8906;
            outline: none;
            box-shadow: 0 0 0 2px rgba(255, 137, 6, 0.2);
        }
    </style>
</head>

<body
    class="flex items-center justify-center min-h-screen bg-[#0f0e17] selection:bg-[#ff8906] selection:text-white relative overflow-hidden">
    <!-- Background Effects -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div
            class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#ff8906] rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-pulse">
        </div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#f25f4c] rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-pulse"
            style="animation-delay: 2s;"></div>
    </div>

    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-md px-6">
        <div class="glass-panel rounded-2xl p-8 shadow-2xl border-t border-white/10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-gradient-to-br from-[#ff8906] to-[#f25f4c] mb-4 shadow-lg shadow-orange-500/20">
                    <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
                    Bienvenue
                </h1>
                <p class="text-gray-400 mt-2 text-sm">Configuration initiale de GoaCloud</p>
            </div>

            <!-- Form -->
            <form action="/setup" method="POST" class="space-y-6">

                <!-- Alerts -->
                {{if .Error}}
                <div
                    class="p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-2">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    {{.Error}}
                </div>
                {{end}}

                <div class="p-4 rounded-lg bg-blue-500/10 border border-blue-500/20 text-blue-300 text-sm text-center">
                    Aucun utilisateur détecté.<br>Créez votre compte <strong>Administrateur</strong>.
                </div>

                <!-- Username -->
                <div class="space-y-2">
                    <label for="username" class="text-sm font-medium text-gray-300 ml-1">Nom d'utilisateur</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input id="username" name="username" type="text" required
                            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm placeholder-gray-500 focus:ring-0"
                            placeholder="admin">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label for="password" class="text-sm font-medium text-gray-300 ml-1">Mot de passe</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" required
                            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm placeholder-gray-500 focus:ring-0"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label for="confirm_password" class="text-sm font-medium text-gray-300 ml-1">Confirmer mot de
                        passe</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input id="confirm_password" name="confirm_password" type="password" required
                            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm placeholder-gray-500 focus:ring-0"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center py-3 px-4 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-[#ff8906] to-[#f25f4c] hover:from-[#f25f4c] hover:to-[#ff8906] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#ff8906] shadow-lg shadow-orange-500/25 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Créer le compte Administrateur
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="mt-8 text-center text-xs text-gray-500">
            &copy; 2024 GoaCloud. All rights reserved.
        </p>
    </div>
</body>

</html>
