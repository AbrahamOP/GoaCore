name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o bin/goacloud ./cmd/server

      - name: Docker build test
        run: docker build -t goacloud:test .

  notify:
    name: Discord Notification
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Sanitize commit message for JSON
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | tr -d '"' | cut -c1-100)
          COMMIT_SHORT="${GITHUB_SHA:0:7}"

          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d "{
            \"embeds\": [{
              \"title\": \"GoaCloud - Build OK, deploy dans ~5min\",
              \"description\": \"**Commit:** \`$COMMIT_SHORT\`\\n**Auteur:** ${{ github.actor }}\\n**Message:** $SAFE_MSG\",
              \"color\": 3066993,
              \"footer\": {\"text\": \"Portainer auto-pull toutes les 5min\"}
            }]
          }"
