name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o bin/goacloud ./cmd/server

  deploy:
    name: Deploy to Portainer
    needs: build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Portainer redeploy
        run: |
          curl -sk -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{}'
          echo "Deploy triggered"

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SAFE_MSG=$(echo "$COMMIT_MSG" | head -1 | tr -d '"\\' | cut -c1-100)
          SHORT="${GITHUB_SHA:0:7}"
          if [ "${{ job.status }}" = "success" ]; then
            COLOR=3066993; STATUS="Deploy OK"
          else
            COLOR=15158332; STATUS="Deploy echoue"
          fi
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d "{
            \"embeds\": [{
              \"title\": \"GoaCloud - $STATUS\",
              \"description\": \"**Commit:** \`$SHORT\`\\n**Auteur:** ${{ github.actor }}\\n**Message:** $SAFE_MSG\",
              \"color\": $COLOR,
              \"footer\": {\"text\": \"Self-hosted runner (homelab)\"}
            }]
          }"
