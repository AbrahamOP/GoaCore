name: Publish image (GHCR)

# Publie l'image Docker publique ghcr.io/abrahamop/goacore pour faciliter
# l'installation (docker compose up sans build). Déclenché par un tag de version
# (vX.Y.Z) ou manuellement. Indépendant du CI de déploiement maison (ci-deploy.yml).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest  # runner GitHub (gratuit sur repo public) : buildx + QEMU dispo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (émulation arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/abrahamop/goacore
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
